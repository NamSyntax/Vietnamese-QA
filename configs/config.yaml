model:
  name: "xlm-roberta-large"
  ckpt_path: "models/xlmr-large-viquad-final"

data:
  dataset_name: "taidng/UIT-ViQuAD2.0"
  max_length: 384
  doc_stride: 128
  max_answer_length: 30
  n_best_size: 20

training:
  output_dir: "xlmr-large-viquad"
  eval_strategy: "steps"
  eval_steps: 500
  logging_steps: 100
  save_steps: 1000
  save_total_limit: 2
  learning_rate: 2.0e-5
  num_train_epochs: 5
  bsz: 16
  gradient_accumulation_steps: 1
  weight_decay: 0.01
  fp16: true
  bf16: false
  dataloader_num_workers: 4
  metric_name: "squad_v2"

inference:
  share_gradio: false
